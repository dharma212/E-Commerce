<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Corona Admin</title>
    <link rel="stylesheet" href="../../assets/vendors/mdi/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="../../assets/vendors/css/vendor.bundle.base.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="shortcut icon" href="../../assets/images/favicon.png" />
  </head>
  <body>
    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="row w-100 m-0">
          <div class="content-wrapper full-page-wrapper d-flex align-items-center auth login-bg">
            <div class="card col-lg-4 mx-auto">
              <div class="card-body px-5 py-5">
                <h3 class="card-title text-left mb-3">Login</h3>
                
                <div id="api-message-box" class="alert d-none mb-3" style="border-radius: 6px; font-size: 14px;"></div>

                <form id="dashboardLoginForm">
                  {% csrf_token %}
                  <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="dashboard_username" name="username" class="form-control p_input" required placeholder="Enter admin username">
                  </div>
                  <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="dashboard_password" name="password" class="form-control p_input" required placeholder="Enter password">
                  </div>
                  <div class="form-group d-flex align-items-center justify-content-between">
                    <div class="form-check">
                      <label class="form-check-label">
                        <input type="checkbox" class="form-check-input"> Remember me </label>
                    </div>
                    <a href="#" class="forgot-pass">Forgot password</a>
                  </div>
                  <div class="text-center">
                    <button type="submit" class="btn btn-primary btn-block enter-btn">Login</button>
                  </div>
                  <div class="d-flex">
                    <button type="button" class="btn btn-facebook mr-2 col">
                      <i class="mdi mdi-facebook"></i> Facebook </button>
                    <button type="button" class="btn btn-google col">
                      <i class="mdi mdi-google-plus"></i> Google plus </button>
                  </div>
                  <p class="sign-up">Don't have an Account?<a href="#"> Sign Up</a></p>
                </form>
              </div>
            </div>
          </div>
          </div>
        </div>
      </div>
    <script src="../../assets/vendors/js/vendor.bundle.base.js"></script>
    <script src="../../assets/js/off-canvas.js"></script>
    <script src="../../assets/js/hoverable-collapse.js"></script>
    <script src="../../assets/js/misc.js"></script>
    <script src="../../assets/js/settings.js"></script>
    <script src="../../assets/js/todolist.js"></script>

    <script>
      function getCsrfTokenFromCookie() {
          let name = 'csrftoken';
          let cookieValue = null;
          if (document.cookie && document.cookie !== '') {
              const cookies = document.cookie.split(';');
              for (let i = 0; i < cookies.length; i++) {
                  const cookie = cookies[i].trim();
                  if (cookie.substring(0, name.length + 1) === (name + '=')) {
                      cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                      break;
                  }
              }
          }
          return cookieValue;
      }

      document.getElementById("dashboardLoginForm").addEventListener("submit", async function(event) {
          event.preventDefault(); 

          const msgBox = document.getElementById("api-message-box");
          const username = document.getElementById("dashboard_username").value.trim();
          const password = document.getElementById("dashboard_password").value.trim();

          msgBox.className = "alert d-none";
          msgBox.innerText = "";

          try {
              const response = await fetch("/api/dashboard-login/", { 
                  method: "POST",
                  headers: {
                      "Content-Type": "application/json",
                      "X-CSRFToken": getCsrfTokenFromCookie()
                  },
                  body: JSON.stringify({
                      username: username,
                      password: password
                  })
              });

              const data = await response.json();

              if (response.ok && data.status === "success") {

                  msgBox.className = "alert alert-success d-block text-white";
                  msgBox.innerText = data.message;
                  
                  setTimeout(() => {
                      window.location.href = "/dashboard/settings/"; 
                  }, 1500);
              } else {
                  msgBox.className = "alert alert-danger d-block text-white";
                  msgBox.innerText = data.message || "Invalid credentials provided.";
              }

          } catch (error) {
              console.error("Error during API communication:", error);
              msgBox.className = "alert alert-danger d-block text-white";
              msgBox.innerText = "Internal connection error. Please try again.";
          }
      });
    </script>
  </body>
</html>
