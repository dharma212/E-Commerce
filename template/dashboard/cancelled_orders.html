{% extends "dashboard/base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"/>

<link rel="stylesheet"
href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<div class="order-page">

    <div class="order-card">

        <h2 class="page-title text-danger">
            Cancelled Orders
        </h2>

        <table id="orderTable"
               class="table table-hover table-striped text-center align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Order ID</th>
                    <th>User</th>
                    <th>Products</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Rating</th>
                    <th>Date</th>
                    <th>Action</th>
                    <th>Invoice</th>
                </tr>
            </thead>

            <tbody id="orderBody"></tbody>

        </table>

    </div>

</div>

{% endblock %}

{% block extra_js %}

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

<script>

let table;

function initTable(){

    table = $('#orderTable').DataTable({
        responsive:true,
        pageLength:10,
        destroy:true
    });

}

function loadOrders(){

    fetch("/api/cancelled-orders/")

    .then(res => res.json())

    .then(data => {

        let html = "";

        data.forEach(order => {

            html += `

<tr>

    <td>
        <span class="order-id-badge">
            #ORD${order.id}
        </span>
    </td>

    <td>
        <strong>${order.user_name || '-'}</strong>
    </td>

    <td>

        ${order.items.slice(0,2).map(item => `

            <div class="product-pill">

                ${
                    (item.product_name || 'Product Deleted').length > 20
                    ? (item.product_name || 'Product Deleted').substring(0,20) + '...'
                    : (item.product_name || 'Product Deleted')
                }

                (x${item.quantity})

            </div>

        `).join('')}

    </td>

    <td>
        <span class="price-box">
            ₹${order.total_price}
        </span>
    </td>

    <td>
        <span class="cancel-status">
            ${order.status}
        </span>
    </td>

    <td>

        ${
            order.rating
            ? `<span class="rating-box">
                    ${order.rating} ★
               </span>`
            : '<span class="text-muted">No Rating</span>'
        }

    </td>

    <td>
        ${new Date(order.created_at).toLocaleDateString()}
    </td>

    <td>

        <a href="/dashboard/order/${order.id}/"
           class="action-btn view-btn-custom">

            <i class="fa fa-eye"></i>

        </a>

    </td>

    <td>

        <a href="/invoice/${order.id}/"
           class="action-btn invoice-btn-custom">

            <i class="fa fa-file-invoice"></i>

        </a>

    </td>

</tr>

`;

        });

        document.getElementById(
            "orderBody"
        ).innerHTML = html;

        if($.fn.DataTable.isDataTable('#orderTable')){

            $('#orderTable').DataTable().destroy();

        }

        initTable();

    });

}

loadOrders();

</script>
<style>

.order-page{
    padding:20px;
}

.order-card{
    background:#fff;
    border-radius:15px;
    padding:25px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}

.page-title{
    font-size:28px;
    font-weight:700;
    margin-bottom:20px;
    border-left:5px solid #dc3545;
    padding-left:12px;
}

#orderTable thead th{
    background:#111827 !important;
    color:#fff !important;
    border:none !important;
    text-transform:uppercase;
    font-size:13px;
}

#orderTable tbody tr:hover{
    background:#fff5f5 !important;
}

.order-id-badge{
    background:#f8f9fa;
    color:#dc3545;
    padding:6px 12px;
    border-radius:30px;
    font-weight:700;
}

.product-pill{
    display:inline-block;
    background:#f1f3f5;
    padding:5px 10px;
    border-radius:20px;
    margin:2px;
    font-size:12px;
}

.price-box{
    color:#198754;
    font-size:15px;
    font-weight:700;
}

.cancel-status{
    background:#dc3545;
    color:#fff;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

.rating-box{
    background:#fff3cd;
    color:#ff9800;
    padding:5px 10px;
    border-radius:20px;
    font-weight:600;
}

.action-btn{
    width:38px;
    height:38px;
    border-radius:10px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    transition:.3s;
}

.view-btn-custom{
    background:#0d6efd;
    color:#fff;
}

.view-btn-custom:hover{
    background:#0b5ed7;
    color:#fff;
}

.invoice-btn-custom{
    background:#198754;
    color:#fff;
}

.invoice-btn-custom:hover{
    background:#157347;
    color:#fff;
}

.dataTables_wrapper .dataTables_filter input{
    border-radius:8px;
    border:1px solid #ddd;
    padding:6px 10px;
}

.dataTables_wrapper .dataTables_length select{
    border-radius:8px;
    border:1px solid #ddd;
}

.dataTables_wrapper .dataTables_paginate .paginate_button.current{
    background:#dc3545 !important;
    color:#fff !important;
    border:none !important;
}

</style>
{% endblock %}
