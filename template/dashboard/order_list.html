{% extends "dashboard/base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"/>

<link rel="stylesheet"
      href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css"/>

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<div class="order-page">

    <div class="order-card">

<div class="order-header">

    <h2 class="page-title">Order List</h2>

    <div class="order-actions">

        <!-- STATUS BUTTONS -->
        <div class="status-filters">

            <button class="btn active" style="background: #3498db;" onclick="filterStatus('')">All</button>
            <button class="btn pending" onclick="filterStatus('pending')">Pending</button>
            <button class="btn shipped" onclick="filterStatus('shipped')">Shipped</button>
            <button class="btn delivered" onclick="filterStatus('delivered')">Delivered</button>
            <button class="btn cancelled" onclick="filterStatus('cancelled')">Cancelled</button>

        </div>

        <!-- DATE FILTER -->
        <div class="date-filters">

            <input type="date" id="startDate">
            <input type="date" id="endDate">

            <button class="filter-btn" onclick="applyDateFilter()">
                Filter
            </button>

        </div>

    </div>

</div>
        <table id="orderTable"
               class="table table-hover table-striped text-center align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Order ID</th>
                    <th>User</th>
                    <th>Products</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Rating</th>
                    <th>Date</th>
                    <th>Action</th>
                    <th>Invoice</th>
                </tr>
            </thead>

            <tbody id="orderBody">
                <!-- API DATA HERE -->
            </tbody>

        </table>

    </div>

</div>
<div id="toastBox"></div>

{% endblock %}


{% block extra_js %}

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

<script>
// ========================================
// DATATABLE
// ========================================
let currentStatus = "";
let startDate = "";
let endDate = "";
let table;

function initTable(){

    table = $('#orderTable').DataTable({

        responsive:true,
        pageLength:10,
        destroy:true

    });
}


// ========================================
// TOAST MESSAGE
// ========================================

function showToast(type, message){

    const toastBox = document.getElementById("toastBox");

    let icon = "fa-check";

    if(type === "error"){
        icon = "fa-xmark";
    }

    if(type === "warning"){
        icon = "fa-triangle-exclamation";
    }

    const toast = document.createElement("div");

    toast.className = `custom-toast ${type}`;

    toast.innerHTML = `

        <div class="toast-icon">
            <i class="fa-solid ${icon}"></i>
        </div>

        <div class="toast-text">

            <div class="toast-title">
                ${type.charAt(0).toUpperCase() + type.slice(1)}
            </div>

            <div class="toast-message">
                ${message}
            </div>

        </div>
    `;

    toastBox.appendChild(toast);

    setTimeout(() => {

        toast.style.opacity = "0";
        toast.style.transform = "translateX(100%)";

        setTimeout(() => {

            toast.remove();

        },300);

    },3000);
}
function filterStatus(status){

    currentStatus = status;

    document.querySelectorAll('.status-filters .btn')
        .forEach(btn => btn.classList.remove('active'));

    event.target.classList.add('active');

    loadOrders();
}
function applyDateFilter(){
    startDate = document.getElementById("startDate").value;
    endDate = document.getElementById("endDate").value;
    loadOrders();
}

// ========================================
// LOAD ORDERS
// ========================================

function loadOrders(){

    let url = "/api/orders/?";

if(currentStatus){
    url += `status=${currentStatus}&`;
}

if(startDate){
    url += `start_date=${startDate}&`;
}

if(endDate){
    url += `end_date=${endDate}&`;
}

fetch(url)

    .then(res => {

        if(!res.ok){
            throw new Error("Failed to load orders");
        }

        return res.json();
    })

    .then(data => {

        let html = "";

        data.forEach(order => {

            let statusClass = order.status.toLowerCase();

            html += `

                <tr>

                    <td class="fw-bold">
                        #ORD${order.id}
                    </td>

                    <td>
                        ${order.user_name || "-"}
                    </td>

                    <td>

                        ${order.items.slice(0,1).map(item => `

                            <div class="product-badge">

                                ${
                                    item.product_name
                                    ? item.product_name.substring(0,20)
                                    : ''
                                }

                                (x${item.quantity})

                            </div>

                        `).join('')}

                        ${order.items.length > 2

                            ? `<div class="small text-muted">
                                    +${order.items.length - 2} more
                               </div>`

                            : ''
                        }

                    </td>

                    <td class="fw-bold text-primary">
                        ₹${order.total_price}
                    </td>

                    <td>

                        <span class="status-badge ${statusClass}">
                            ${order.status}
                        </span>

                    </td>
                    <td>
                        ${order.rating ? (() => {
                            let cls = "rating-badge";

                            if (order.rating <= 2) cls += " low";
                            else if (order.rating == 3) cls += " mid";
                            else cls += " high";

                            return `<span class="${cls}">
                                        ${order.rating} ★
                                    </span>`;
                        })() : `<span class="text-muted">No Rating</span>`}
                    </td>
                    <td>
                        ${new Date(order.created_at).toLocaleDateString()}
                    </td>

                    <td>

                        <div class="action-wrapper">

                            <a href="/dashboard/order/${order.id}/"
                               class="icon-btn view-btn"
                               title="View Order">

                                <i class="fa-solid fa-eye"></i>

                            </a>

                            <button onclick="deleteOrder(${order.id})"
                                    class="icon-btn delete-btn"
                                    title="Delete Order">

                                <i class="fa-solid fa-trash"></i>

                            </button>

                        </div>

                    </td>

                    <td>

                        <a href="/invoice/${order.id}/"
                        class="icon-btn view-btn"
                        title="Download Invoice"
                        download>

                            <i class="fa-solid fa-file-invoice"></i>

                        </a>

                    </td>
                </tr>

            `;
        });

        document.getElementById("orderBody").innerHTML = html;

        setTimeout(() => {

            if ($.fn.DataTable.isDataTable('#orderTable')) {
                $('#orderTable').clear().destroy();
            }

            initTable();

        }, 50);

    })

    .catch(error => {

        console.log(error);

        showToast("error","Failed to load orders");
    });

}


// ========================================
// CSRF TOKEN
// ========================================

function getCSRFToken(){

    let cookieValue = null;

    const cookies = document.cookie.split(';');

    for(let i = 0; i < cookies.length; i++){

        const cookie = cookies[i].trim();

        if(cookie.startsWith('csrftoken=')){

            cookieValue = cookie.substring('csrftoken='.length);

            break;
        }
    }

    return cookieValue;
}


// ========================================
// DELETE ORDER
// ========================================

function deleteOrder(id){

    fetch(`/api/orders/${id}/delete/`, {

        method:"DELETE",

        headers:{

            "X-CSRFToken": getCSRFToken(),
            "Content-Type":"application/json"

        }

    })

    .then(res => {

        if(!res.ok){
            throw new Error("Delete failed");
        }

        return res.json();
    })

    .then(data => {

        showToast("success", data.message);

        loadOrders();

    })

    .catch(error => {

        console.log(error);

        showToast("error","Failed to delete order");

    });
}


// ========================================
// INITIAL LOAD
// ========================================

loadOrders();
</script>
<style>
/* HEADER LAYOUT */
.order-header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 15px;
}

/* RIGHT SIDE WRAPPER */
.order-actions{
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
}

/* STATUS BUTTONS */
.status-filters{
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

/* BASE BUTTON STYLE */
.status-filters .btn{
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: 0.2s;
    color: #fff;
}

/* COLORS */
.status-filters .btn.active{ background:#111; }
.status-filters .pending{ background:#f39c12; }
.status-filters .shipped{ background:#8e44ad; }
.status-filters .delivered{ background:#2ecc71; }
.status-filters .cancelled{ background:#e74c3c; }

/* HOVER EFFECT */
.status-filters .btn:hover{
    transform: translateY(-2px);
    opacity: 0.9;
}

/* DATE FILTER MODERN */
.date-filters{
    display: flex;
    gap: 8px;
    align-items: center;
}

.date-filters input{
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 13px;
}

/* FILTER BUTTON */
.filter-btn{
    background: #3498db;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.filter-btn:hover{
    background: #217dbb;
}
</style>
{% endblock %}
