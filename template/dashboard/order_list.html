<!-- templates/dashboard/order/order_list.html -->

{% extends "dashboard/base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"/>

<link rel="stylesheet"
      href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css"/>

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>


<style>
/* =========================
   PAGE BACKGROUND (E-COMMERCE STYLE)
========================= */
.order-page{
    padding:30px;
    background:#f5f7fb;
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
}

/* =========================
   CARD (CLEAN STORE PANEL)
========================= */
.order-card{
    background:#ffffff;
    border-radius:16px;
    padding:22px;
    box-shadow:0 8px 24px rgba(0,0,0,0.06);
    border:1px solid #eef2f7;
}

/* =========================
   TITLE
========================= */
.page-title{
    font-size:24px;
    font-weight:700;
    color:#111827;
    margin-bottom:18px;
}

/* =========================
   TABLE WRAPPER FIX (IMPORTANT)
========================= */
#orderTable{
    width:100% !important;
    border-collapse:separate;
    border-spacing:0;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
}

/* =========================
   HEADER (DARK STORE STYLE)
========================= */
#orderTable thead th{
    background:#111827;
    color:#ffffff;
    padding:14px 12px;
    font-size:13px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.5px;
    border:none;
}

/* =========================
   REMOVE BLACK/WHITE STRIPES (FIX)
========================= */
#orderTable tbody tr{
    background:#ffffff !important;
    transition:all 0.2s ease;
}

#orderTable tbody tr:nth-child(even),
#orderTable tbody tr:nth-child(odd){
    background:#ffffff !important;
}

/* ROW HOVER (E-COMMERCE FEEL) */
#orderTable tbody tr:hover{
    background:#f3f6ff !important;
}

/* =========================
   CELLS
========================= */
#orderTable tbody td{
    padding:14px 12px;
    font-size:14px;
    color:#374151;
    border-bottom:1px solid #eef2f7;
    vertical-align:middle;
}

/* =========================
   PRODUCT BADGE (STORE STYLE)
========================= */
.product-badge{
    display:inline-block;
    background:#eff6ff;
    color:#1d4ed8;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
    margin:2px;
}

/* =========================
   STATUS BADGE (MODERN ECOM STYLE)
========================= */
.status-badge{
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    color:#fff !important;
    text-transform:capitalize;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* STATUS COLORS */
.pending{ background:#f59e0b; }
.accepted{ background:#0ea5e9; }
.shipped{ background:#6366f1; }
.delivered{ background:#22c55e; }
.cancelled{ background:#ef4444; }

/* =========================
   ACTION BUTTONS (SHOPIFY STYLE)
========================= */
.action-btn{
    border:none;
    padding:7px 12px;
    border-radius:8px;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    transition:0.2s ease;
    text-decoration:none;
    display:inline-block;
}

.view-btn{
    background:#2563eb;
    color:#fff;
}

.view-btn:hover{
    background:#1d4ed8;
}

.delete-btn{
    background:#ef4444;
    color:#fff;
}

.delete-btn:hover{
    background:#dc2626;
}

/* =========================
   DATATABLE CLEAN UI
========================= */
.dataTables_wrapper .dataTables_filter input{
    border:1px solid #e5e7eb !important;
    border-radius:10px !important;
    padding:8px 12px !important;
    outline:none;
}

.dataTables_wrapper .dataTables_length select{
    border-radius:10px;
    padding:6px 10px;
}

/* PAGINATION CLEAN */
.dataTables_wrapper .dataTables_paginate .paginate_button{
    border-radius:8px !important;
}


/* =========================
   ACTION BUTTON WRAPPER
========================= */
.action-wrapper{
    display:flex;
    gap:10px;
    justify-content:center;
    align-items:center;
}

/* =========================
   BASE ICON BUTTON
========================= */
.icon-btn{
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    font-size:15px;
    color:#fff;
    cursor:pointer;
    border:none;
    text-decoration:none;
    transition:all 0.25s ease;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* =========================
   VIEW / EDIT BUTTON
========================= */
/* REMOVE DEFAULT LINK STYLE */
.icon-btn{
    text-decoration:none !important;
    color:#fff !important;
}

/* REMOVE UNDERLINE ON HOVER */
.icon-btn:hover,
.icon-btn:focus,
.icon-btn:active{
    text-decoration:none !important;
    outline:none !important;
}

/* =========================
   DELETE BUTTON
========================= */
.delete-btn{
    background:#ef4444;
}

.delete-btn:hover{
    background:#dc2626;
    transform:translateY(-3px);
    box-shadow:0 8px 18px rgba(239,68,68,0.25);
}

/* =========================
   ICON CLICK EFFECT
========================= */
.icon-btn:active{
    transform:scale(0.92);
}

/* =========================
   TOOLTIP SUPPORT (BASIC)
========================= */
.icon-btn[title]{
    position:relative;
}

/* =========================
   TOAST CONTAINER
========================= */
#toastBox{
    position:fixed;
    top:20px;
    right:20px;
    z-index:999999;
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* =========================
   TOAST
========================= */
.custom-toast{
    min-width:320px;
    background:#fff;
    border-radius:14px;
    padding:16px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    border-left:5px solid #2563eb;
    animation:toastSlide 0.35s ease;
}

/* SUCCESS */
.custom-toast.success{
    border-color:#22c55e;
}

/* ERROR */
.custom-toast.error{
    border-color:#ef4444;
}

/* WARNING */
.custom-toast.warning{
    border-color:#f59e0b;
}

/* ICON */
.toast-icon{
    width:38px;
    height:38px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    color:#fff;
    flex-shrink:0;
}

.custom-toast.success .toast-icon{
    background:#22c55e;
}

.custom-toast.error .toast-icon{
    background:#ef4444;
}

.custom-toast.warning .toast-icon{
    background:#f59e0b;
}

/* TEXT */
.toast-text{
    flex:1;
}

.toast-title{
    font-size:15px;
    font-weight:700;
    color:#111827;
    margin-bottom:3px;
}

.toast-message{
    font-size:13px;
    color:#6b7280;
}

/* ANIMATION */
@keyframes toastSlide{

    from{
        opacity:0;
        transform:translateX(100%);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}
</style>


<div class="order-page">

    <div class="order-card">

        <h2 class="page-title">Order List </h2>

        <table id="orderTable"
               class="table table-hover table-striped text-center align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Order ID</th>
                    <th>User</th>
                    <th>Products</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="orderBody">
                <!-- API DATA HERE -->
            </tbody>

        </table>

    </div>

</div>
<div id="toastBox"></div>

{% endblock %}


{% block extra_js %}

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

<script>
// ========================================
// DATATABLE
// ========================================

let table;

function initTable(){

    table = $('#orderTable').DataTable({

        responsive:true,
        pageLength:10,
        destroy:true

    });
}


// ========================================
// TOAST MESSAGE
// ========================================

function showToast(type, message){

    const toastBox = document.getElementById("toastBox");

    let icon = "fa-check";

    if(type === "error"){
        icon = "fa-xmark";
    }

    if(type === "warning"){
        icon = "fa-triangle-exclamation";
    }

    const toast = document.createElement("div");

    toast.className = `custom-toast ${type}`;

    toast.innerHTML = `

        <div class="toast-icon">
            <i class="fa-solid ${icon}"></i>
        </div>

        <div class="toast-text">

            <div class="toast-title">
                ${type.charAt(0).toUpperCase() + type.slice(1)}
            </div>

            <div class="toast-message">
                ${message}
            </div>

        </div>
    `;

    toastBox.appendChild(toast);

    setTimeout(() => {

        toast.style.opacity = "0";
        toast.style.transform = "translateX(100%)";

        setTimeout(() => {

            toast.remove();

        },300);

    },3000);
}


// ========================================
// LOAD ORDERS
// ========================================

function loadOrders(){

    fetch("/api/orders/")

    .then(res => {

        if(!res.ok){
            throw new Error("Failed to load orders");
        }

        return res.json();
    })

    .then(data => {

        let html = "";

        data.forEach(order => {

            let statusClass = order.status.toLowerCase();

            html += `

                <tr>

                    <td class="fw-bold">
                        #ORD${order.id}
                    </td>

                    <td>
                        ${order.user_name || "-"}
                    </td>

                    <td>

                        ${order.items.slice(0,2).map(item => `

                            <div class="product-badge">

                                ${
                                    item.product_name
                                    ? item.product_name.substring(0,20)
                                    : ''
                                }

                                (x${item.quantity})

                            </div>

                        `).join('')}

                        ${order.items.length > 2

                            ? `<div class="small text-muted">
                                    +${order.items.length - 2} more
                               </div>`

                            : ''
                        }

                    </td>

                    <td class="fw-bold text-primary">
                        ₹${order.total_price}
                    </td>

                    <td>

                        <span class="status-badge ${statusClass}">
                            ${order.status}
                        </span>

                    </td>

                    <td>
                        ${new Date(order.created_at).toLocaleDateString()}
                    </td>

                    <td>

                        <div class="action-wrapper">

                            <a href="/dashboard/order/${order.id}/"
                               class="icon-btn view-btn"
                               title="View Order">

                                <i class="fa-solid fa-eye"></i>

                            </a>

                            <button onclick="deleteOrder(${order.id})"
                                    class="icon-btn delete-btn"
                                    title="Delete Order">

                                <i class="fa-solid fa-trash"></i>

                            </button>

                        </div>

                    </td>

                </tr>

            `;
        });

        document.getElementById("orderBody").innerHTML = html;

        if($.fn.DataTable.isDataTable('#orderTable')){

            $('#orderTable').DataTable().destroy();
        }

        initTable();

    })

    .catch(error => {

        console.log(error);

        showToast("error","Failed to load orders");
    });

}


// ========================================
// CSRF TOKEN
// ========================================

function getCSRFToken(){

    let cookieValue = null;

    const cookies = document.cookie.split(';');

    for(let i = 0; i < cookies.length; i++){

        const cookie = cookies[i].trim();

        if(cookie.startsWith('csrftoken=')){

            cookieValue = cookie.substring('csrftoken='.length);

            break;
        }
    }

    return cookieValue;
}


// ========================================
// DELETE ORDER
// ========================================

function deleteOrder(id){

    fetch(`/api/orders/${id}/delete/`, {

        method:"DELETE",

        headers:{

            "X-CSRFToken": getCSRFToken(),
            "Content-Type":"application/json"

        }

    })

    .then(res => {

        if(!res.ok){
            throw new Error("Delete failed");
        }

        return res.json();
    })

    .then(data => {

        showToast("success", data.message);

        loadOrders();

    })

    .catch(error => {

        console.log(error);

        showToast("error","Failed to delete order");

    });
}


// ========================================
// INITIAL LOAD
// ========================================

loadOrders();
</script>
{% endblock %}
