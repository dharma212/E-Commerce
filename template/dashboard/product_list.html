{% extends "dashboard/base.html" %}
{% block content %}
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<div class="content-wrapper">

  <div class="custom-card">
  <div class="page-header mb-3">
    <h3 class="page-title text-dark">Product List</h3>
  </div>
    <table id="productTable" class="table">

      <thead>
        <tr>
          <th>#</th>
          <th>Image</th>
          <th>Product</th>
          <th>Category</th>
          <th>Type</th>
          <th>Price</th>
          <th>Discount</th>
          <th>Stock</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody></tbody>

    </table>
<!-- IMAGE MODAL -->
<div id="imageModal" class="img-modal">
    <span class="close-btn">&times;</span>

    <!-- BIG IMAGE -->
    <img class="modal-content" id="modalMainImg">

    <!-- THUMBNAILS -->
    <div id="thumbnailContainer" class="thumb-container"></div>
</div>
  </div>

</div>
<style>
/* THUMBNAILS */
.thumb-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
    flex-wrap: wrap;
}

.thumb-img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0.7;
    border: 2px solid transparent;
    transition: 0.3s;
}

.thumb-img:hover {
    opacity: 1;
    transform: scale(1.05);
}

.thumb-img.active {
    border-color: #4CAF50;
    opacity: 1;
}
/* IMAGE */
.product-img {
    width: 50px;
    height: 50px;
    border-radius: 10px;
    object-fit: cover;
    cursor: pointer;
    transition: 0.3s;
}

.product-img:hover {
    transform: scale(1.1);
}

/* MODAL FULL SCREEN */
.img-modal {
    display: none;
    position: fixed;
    z-index: 9999;
    padding-top: 80px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
}

/* IMAGE CENTER */
.modal-content {
    display: block;
    margin: auto;
    max-width: 80%;
    max-height: 80%;
    border-radius: 10px;
}

/* CLOSE BUTTON */
.close-btn {
    position: absolute;
    top: 20px;
    right: 40px;
    color: #fff;
    font-size: 35px;
    font-weight: bold;
    cursor: pointer;
}

.close-btn:hover {
    color: red;
}

/* PAGE */
.content-wrapper {
    background: #f4f6f9;
    padding: 20px;
}

/* CARD */
.custom-card {
    background: #ffffff;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 5px 18px rgba(0,0,0,0.08);
    border: none;
}

/* TABLE REMOVE LINES */
.table {
    border: none !important;
}

.table th,
.table td {
    border: none !important;
}

/* HEADER */
.table thead th {
    color: #888;
    font-size: 13px;
    font-weight: 600;
}

/* ROW STYLE */
.table tbody tr {
    transition: 0.3s;
    border-radius: 10px;
}

.table tbody tr:hover {
    background: #f8fafc;
}

/* CELL */
.table td {
    padding: 14px 10px;
    vertical-align: middle;
}

/* IMAGE */
.product-img {
    width: 45px;
    height: 45px;
    border-radius: 10px;
    object-fit: cover;
}

/* NAME */
.product-name {
    font-weight: 600;
    color: #222;
}

/* PRICE */
.price {
    color: #4CAF50;
    font-weight: 600;
}

/* STOCK */
.stock {
    font-size: 14px;
    color: #555;
}

.low-stock {
    color: red;
    font-weight: 600;
}

/* NO IMAGE */
.no-img {
    font-size: 12px;
    color: #aaa;
}

/* DATATABLE SEARCH */
.dataTables_filter input {
    border-radius: 8px !important;
    border: 1px solid #ddd !important;
    padding: 6px 10px !important;
}

/* PAGINATION */
.dataTables_wrapper .dataTables_paginate .paginate_button {
    border-radius: 6px !important;
    padding: 4px 10px !important;
}

.dataTables_wrapper .dataTables_paginate .paginate_button.current {
    background: #4CAF50 !important;
    color: #fff !important;
    border: none;
}

</style>
<script>

fetch('/api/products/')
.then(res => res.json())
.then(data => {


    let tbody = '';

    data.forEach((item, index) => {

        let imageUrl = '';

        if(item.images && item.images.length > 0){
            imageUrl = 'http://127.0.0.1:8000' + item.images[0].image;
        }

        tbody += `
        <tr>

            <td>${index + 1}</td>

            <!-- IMAGE -->
            <td>
                ${
                    imageUrl 
                    ? `<img src="${imageUrl}" class="product-img" onclick='openImageGallery(${JSON.stringify(item.images)})'>`
                    : `<span class="no-img">No Image</span>`
                }
            </td>

            <!-- PRODUCT NAME -->
            <td class="product-name">
                ${item.name}

                ${
                    item.discount > 0
                    ? `<span style="
                        background:#28a745;
                        color:#fff;
                        font-size:10px;
                        padding:2px 6px;
                        border-radius:4px;
                        margin-left:5px;
                    ">${item.discount_percent}% OFF</span>`
                    : ''
                }
            </td>

            <td>${item.category_name}</td>
            <td>${item.type_name}</td>

            <!-- PRICE COLUMN -->
            <td class="price">

                ${
                    item.discount > 0 
                    ? `
                        <div>₹ ${item.final_price}</div>
                        <div style="font-size:12px;color:#888;">
                            <del>₹ ${item.mrp}</del>
                        </div>
                      `
                    : `₹ ${item.price}`
                }

            </td>

            <!-- DISCOUNT COLUMN -->
            <td>

                ${
                    item.discount > 0 
                    ? `<span style="color:#28a745;font-weight:600;">
                        ${item.discount_percent}% OFF
                       </span>`
                    : `<span style="color:#aaa;">No Discount</span>`
                }

            </td>

            <td>${item.stock}</td>

            <td>
                <button class="btn btn-sm btn-primary"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button>
            </td>

        </tr>
        `;
    });

    $('#productTable tbody').html(tbody);

    $('#productTable').DataTable({
        pageLength: 5,
        lengthChange: false,
        info: false
    });

});

</script>

<script>

// CLOSE MODAL
document.querySelector(".close-btn").onclick = function(){
    document.getElementById("imageModal").style.display = "none";
};

// CLICK OUTSIDE
window.onclick = function(e){
    let modal = document.getElementById("imageModal");
    if(e.target == modal){
        modal.style.display = "none";
    }
};

// IMAGE GALLERY
function openImageGallery(images){

    let modal = document.getElementById("imageModal");
    let mainImg = document.getElementById("modalMainImg");
    let thumbContainer = document.getElementById("thumbnailContainer");

    modal.style.display = "block";
    thumbContainer.innerHTML = "";

    if(!images || images.length === 0) return;

    let firstImg = 'http://127.0.0.1:8000' + images[0].image;
    mainImg.src = firstImg;

    images.forEach((imgObj, index) => {

        let imgUrl = 'http://127.0.0.1:8000' + imgObj.image;

        let thumb = document.createElement("img");
        thumb.src = imgUrl;
        thumb.className = "thumb-img";

        if(index === 0){
            thumb.classList.add("active");
        }

        thumb.onclick = () => {
            mainImg.src = imgUrl;
            document.querySelectorAll(".thumb-img").forEach(el => el.classList.remove("active"));
            thumb.classList.add("active");
        };

        thumbContainer.appendChild(thumb);
    });
}

</script>
{% endblock content %}
