{% extends "dashboard/base.html" %}
{% block content %}

<div class="content-wrapper">
  <div class="container-fluid">

    <div class="card shadow-sm border-0 p-4">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Add Product Type</h4>
      </div>

      <form id="typeForm">
        {% csrf_token %}
        <div class="row">

          <!-- CATEGORY -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Category</label>
            <select id="category" class="form-control">
              <option value="">Loading...</option>
            </select>
          </div>

          <!-- TYPE NAME -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Type Name</label>
            <input type="text" id="type_name" class="form-control" placeholder="Enter type name">
          </div>

          <!-- BUTTON -->
          <div class="col-md-12 text-end">
            <button type="submit" id="submitBtn" class="btn btn-primary px-4">
              Add Type
            </button>
          </div>

        </div>

      </form>

      <!-- MESSAGE -->
      <div id="msg" class="mt-3"></div>

    </div>

  </div>
</div>
<style>
 /* =========================
   GLOBAL STYLE
========================= */
body {
  background: #f5f7fb;
  font-family: "Segoe UI", sans-serif;
  color: #333;
}

/* =========================
   CARD DESIGN
========================= */
.card {
  border-radius: 12px;
  border: none;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  transition: 0.3s;
  background: #fff;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.card-header {
  background: #ffffff !important;
  border-bottom: 1px solid #eee;
  font-weight: 600;
  padding: 15px;
}

/* =========================
   INPUT FIX (NO BLACK ISSUE)
========================= */
.form-control {
  background-color: #fff !important;
  color: #333 !important;
  border: 1px solid #e0e0e0 !important;
  border-radius: 10px;
  padding: 10px 12px;
  transition: 0.2s ease-in-out;
}

/* FOCUS FIX */
.form-control:focus {
  background-color: #fff !important;
  color: #333 !important;
  border-color: #4a90e2 !important;
  box-shadow: 0 0 0 0.15rem rgba(74,144,226,0.2) !important;
  outline: none !important;
}

/* AUTOFILL FIX (Chrome black issue) */
input:-webkit-autofill,
textarea:-webkit-autofill,
select:-webkit-autofill {
  background-color: #fff !important;
  -webkit-box-shadow: 0 0 0px 1000px white inset !important;
  -webkit-text-fill-color: #333 !important;
}

/* LABEL */
.form-label {
  font-weight: 500;
  font-size: 14px;
  color: #333;
}

/* =========================
   BUTTON
========================= */
.btn-primary {
  background: linear-gradient(135deg, #4a90e2, #357abd);
  border: none;
  border-radius: 10px;
  padding: 10px;
  font-weight: 500;
  transition: 0.3s;
}

.btn-primary:hover {
  background: linear-gradient(135deg, #357abd, #2c5ea8);
  transform: scale(1.02);
}

/* =========================
   TABLE
========================= */
.table {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
}

.table thead {
  background: #f1f3f6;
  font-size: 14px;
}

.table tbody tr:hover {
  background: #f9fbff;
}

/* ACTION BUTTONS */
.btn-warning,
.btn-danger {
  border-radius: 8px;
  font-size: 13px;
}

/* TITLE */
h4 {
  color: #2c3e50;
  font-weight: 700;
}
</style>
<script>

// =======================
// LOAD CATEGORIES
// =======================
function loadCategories() {
    fetch('/api/categories/')
    .then(res => res.json())
    .then(data => {
        let cat = document.getElementById('category');
        cat.innerHTML = '<option value="">Select Category</option>';

        data.forEach(item => {
            cat.innerHTML += `<option value="${item.id}">${item.name}</option>`;
        });
    })
    .catch(() => {
        document.getElementById('category').innerHTML =
        '<option>Error loading categories</option>';
    });
}

loadCategories();


// =======================
// SHOW MESSAGE
// =======================
function showMessage(text, type="success") {
    const msg = document.getElementById('msg');
    msg.innerHTML = `
      <div class="alert alert-${type}">
        ${text}
      </div>
    `;

    setTimeout(() => {
        msg.innerHTML = "";
    }, 3000);
}


// =======================
// SUBMIT FORM
// =======================
function getCSRFToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]').value;
}
document.getElementById('typeForm').addEventListener('submit', function(e){
    e.preventDefault();

    let name = document.getElementById('type_name').value.trim();
    let category = document.getElementById('category').value;
    let btn = document.getElementById('submitBtn');

    // validation
    if (!category || !name) {
        showMessage("Please fill all fields", "danger");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "Saving...";

    fetch('/api/add-type/', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCSRFToken()   // ✅ ADD THIS
    },
    credentials: 'same-origin',         // ✅ SAFE PRACTICE
    body: JSON.stringify({
        name: name,
        category: category
    })
})
    .then(res => res.json())
    .then(data => {

        if (data.success) {
            showMessage("Type added successfully", "success");
            document.getElementById('typeForm').reset();
        } else {
            showMessage(data.message || "Something went wrong", "danger");
        }

    })
    .catch(() => {
        showMessage("Server error", "danger");
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerHTML = "Add Type";
    });

});

</script>

{% endblock %}
