{% extends "dashboard/base.html" %}
{% load static %}
{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<div class="content-wrapper">

    <div class="card shadow-sm border-0 p-4">
      <div class="d-flex justify-content-between align-items-center mb-3 text-dark">
        <h3 class="mb-0">Add Product</h3>
      </div>
    <form id="productForm" enctype="multipart/form-data" onsubmit="return false;">
            {% csrf_token %}
      <div class="row g-4">

        <!-- NAME -->
        <div class="col-md-6">
            <label>Product Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter Product Name">
            <small class="error-text" id="error-name"></small>
        </div>

        <!-- CATEGORY -->
        <div class="col-md-3">
            <label>Category</label>
            <select id="category" class="form-control"></select>
            <small class="error-text" id="error-category"></small>
        </div>

        <!-- TYPE -->
        <div class="col-md-3">
            <label>Type</label>
            <select id="type" class="form-control"></select>
            <small class="error-text" id="error-type"></small>
        </div>

        <!-- MRP -->
        <div class="col-md-6">
            <label>MRP (Original Price)</label>
            <input type="number" id="mrp" class="form-control" placeholder="Enter MRP">
            <small class="error-text" id="error-mrp"></small>
        </div>

        <!-- PRICE -->
        <div class="col-md-6">
            <label>Price</label>
            <input type="number" id="price" class="form-control" placeholder="Enter Price">
            <small class="error-text" id="error-price"></small>
        </div>

        <!-- FINAL PRICE -->
        <div class="col-md-6">
            <label>Final Price</label>
            <input type="text" id="final_price" class="form-control" readonly>
        </div>

        <!-- DISCOUNT % -->
        <div class="col-md-6">
            <label>Discount %</label>
            <input type="text" id="discount_percent" class="form-control" readonly>
        </div>

        <!-- STOCK -->
        <div class="col-md-6">
            <label>Stock</label>
            <input type="number" id="stock" class="form-control" placeholder="Enter Stock">
            <small class="error-text" id="error-stock"></small>
        </div>

        <div class="col-md-6">
            <label>Discount Amount</label>
            <input type="number" id="discount" class="form-control" placeholder="Enter Discount">
            <small class="error-text" id="error-discount"></small>
        </div>

        <!-- DESCRIPTION -->
        <div class="col-md-12">
            <label>Description</label>
            <textarea id="description" class="form-control" rows="3" placeholder="Enter Description..........."></textarea>
            <small class="error-text" id="error-description"></small>
        </div>

        <!-- IMAGE SECTION -->
            <div class="col-md-12">
            <label>Product Images (Max 5)</label>

            <div class="image-upload-box">
                <input type="file" id="imageInput" multiple>
                <p>Click or Drag Images Here</p>
            </div>
            <small class="error-text" id="error-imageInput"></small>

            <div id="previewContainer" class="image-grid mt-3"></div>
            </div>

            <!-- BUTTON -->
            <div class="col-md-12">
                <button type="button" id="submitBtn" class="btn btn-primary">Add Product</button>
            </div>

        </div>

    </form>

  </div>

</div>

<!-- ================= CSS ================= -->
<style>
    /* ================= PAGE ================= */
.content-wrapper {
    background: #f5f7fb;
    padding: 20px;
}

/* ================= CARD ================= */
.card {
    background: #ffffff;
    border-radius: 14px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.06);
    border: none;
}

/* ================= LABEL ================= */
label {
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 6px;
}

/* ================= INPUT ================= */
.form-control {
    background: #fff !important;
    border: 1px solid #dcdcdc !important;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    color: #333 !important;
    transition: all 0.2s ease;
}

/* FOCUS */
.form-control:focus {
    border-color: #4CAF50 !important;
    box-shadow: 0 0 0 2px rgba(76,175,80,0.15);
}

/* SELECT FIX */
select.form-control {
    background-color: #fff !important;
}

/* ================= FILE INPUT ================= */
input[type="file"] {
    padding: 8px;
    background: #fff;
    border-radius: 8px;
}

/* ================= BUTTON ================= */
.btn-primary {
  background: linear-gradient(135deg, #4a90e2, #357abd);
  border: none;
  border-radius: 10px;
  padding: 10px 15px;
  font-weight: 500;
  transition: 0.3s;
}

.btn-primary:hover {
  background: linear-gradient(135deg, #357abd, #2c5ea8);
  transform: scale(1.02);
}

/* ================= IMAGE GRID ================= */
.image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 15px;
}

/* IMAGE CARD */
.img-box {
    position: relative;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #eee;
    transition: 0.3s;
}

/* HOVER EFFECT */
.img-box:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

/* IMAGE */
.img-box img {
    width: 100%;
    height: 130px;
    object-fit: cover;
}

/* ACTION BUTTONS */
.img-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: flex;
    gap: 5px;
}

/* BUTTON STYLE */
.img-actions button {
    border: none;
    width: 26px;
    height: 26px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* DELETE */
.delete-btn {
    background: #e74c3c;
    color: #fff;
}

/* EDIT */
.edit-btn {
    background: #f39c12;
    color: #fff;
}

/* ================= SPACING FIX ================= */
.row.g-4 > div {
    margin-bottom: 10px;
}
.image-upload-box {
    border: 2px dashed #ccc;
    padding: 25px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    background: #fafafa;
    transition: 0.3s;
}

.image-upload-box:hover {
    border-color: #4CAF50;
    background: #f0fff4;
}

.image-upload-box input {
    display: none;
}

.image-upload-box p {
    margin: 0;
    color: #888;
}
/* DRAGGING EFFECT */
.img-box.dragging {
    opacity: 0.4;
    border: 2px dashed #4CAF50;
}

/* MAIN IMAGE BADGE */
.main-badge {
    position: absolute;
    bottom: 6px;
    left: 6px;
    background: #4CAF50;
    color: #fff;
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 5px;
}
.toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 99999;
}

.toast {
    min-width: 250px;
    margin-bottom: 10px;
    padding: 12px 15px;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    animation: slideIn 0.3s ease;
}

.toast.success { background: #4CAF50; }
.toast.error { background: #e74c3c; }
.toast.warning { background: #f39c12; }

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
.error-text {
    color: #e74c3c;
    font-size: 12px;
    margin-top: 4px;
    display: block;
}

.input-error {
    border-color: #e74c3c !important;
}
</style>

<script>
// ================= GLOBAL =================
let selectedImages = [];

// ================= TOAST =================
function getToastContainer() {
    let container = document.getElementById("globalToastContainer");

    if (!container) {
        container = document.createElement("div");
        container.id = "globalToastContainer";
        container.style.position = "fixed";
        container.style.top = "20px";
        container.style.right = "20px";
        container.style.zIndex = "999999";
        document.body.appendChild(container);
    }
    return container;
}

function showToast(message, type = "success", duration = 3000) {
    const container = getToastContainer();

    const toast = document.createElement("div");
    toast.style.minWidth = "260px";
    toast.style.marginBottom = "10px";
    toast.style.padding = "14px 16px";
    toast.style.borderRadius = "10px";
    toast.style.color = "#fff";
    toast.style.fontSize = "14px";
    toast.style.display = "flex";
    toast.style.alignItems = "center";
    toast.style.gap = "10px";
    toast.style.boxShadow = "0 8px 20px rgba(0,0,0,0.2)";
    toast.style.opacity = "0";
    toast.style.transform = "translateX(100%)";
    toast.style.transition = "all 0.4s ease";

    let icon = `<i class="bi bi-check-circle-fill"></i>`;
    if (type === "error") icon = `<i class="bi bi-x-circle-fill"></i>`;
    if (type === "warning") icon = `<i class="bi bi-exclamation-triangle-fill"></i>`;

    if (type === "success") toast.style.background = "#4CAF50";
    else if (type === "error") toast.style.background = "#e74c3c";
    else if (type === "warning") toast.style.background = "#f39c12";
    else toast.style.background = "#333";

    toast.innerHTML = `${icon} <span>${message}</span>`;
    container.appendChild(toast);

    requestAnimationFrame(() => {
        toast.style.opacity = "1";
        toast.style.transform = "translateX(0)";
    });

    setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transform = "translateX(100%)";
        setTimeout(() => toast.remove(), 400);
    }, duration);
}

// ================= CSRF =================
function getCSRFToken() {
    let name = "csrftoken=";
    let cookies = document.cookie.split(";");

    for (let i = 0; i < cookies.length; i++) {
        let c = cookies[i].trim();
        if (c.startsWith(name)) {
            return c.substring(name.length, c.length);
        }
    }
    return "";
}

// ================= ERROR HANDLING =================
function clearErrors() {
    document.querySelectorAll(".error-text").forEach(el => el.innerText = "");
    document.querySelectorAll(".form-control").forEach(el => el.classList.remove("input-error"));
}

function showError(inputId, message) {
    let errorEl = document.getElementById(`error-${inputId}`);
    if (errorEl) errorEl.innerText = message;

    let inputEl = document.getElementById(inputId);
    if (inputEl) inputEl.classList.add("input-error");
}

// ================= NEW: DISCOUNT CALC =================
function calculateDiscount() {
    let mrp = parseFloat(document.getElementById('mrp')?.value) || 0;
    let discount = parseFloat(document.getElementById('discount')?.value) || 0;

    if (discount > mrp) {
        showToast("Discount cannot be greater than MRP", "error");
        document.getElementById('discount').value = "";
        return;
    }

    let finalPrice = mrp - discount;
    let percent = mrp ? ((discount / mrp) * 100).toFixed(2) : 0;

    document.getElementById('final_price').value = finalPrice;
    document.getElementById('discount_percent').value = percent + "%";
}

// ================= PAGE LOAD =================
document.addEventListener("DOMContentLoaded", function () {

    const fileInput = document.getElementById("imageInput");
    const uploadBox = document.querySelector(".image-upload-box");

    // NEW: discount listeners
    document.getElementById('mrp')?.addEventListener('input', calculateDiscount);
    document.getElementById('discount')?.addEventListener('input', calculateDiscount);

    // ================= CATEGORY =================
    fetch('/api/categories/')
    .then(res => res.json())
    .then(data => {
        let cat = document.getElementById('category');
        cat.innerHTML = '<option value="">Select Category</option>';
        data.forEach(item => {
            cat.innerHTML += `<option value="${item.id}">${item.name}</option>`;
        });
    })
    .catch(() => showToast("Failed to load categories", "error"));

    // ================= TYPE =================
    document.getElementById('category').addEventListener('change', function () {
        let id = this.value;
        if (!id) return;

        fetch(`/api/types/${id}/`)
        .then(res => res.json())
        .then(data => {
            let type = document.getElementById('type');
            type.innerHTML = '<option value="">Select Type</option>';
            data.forEach(item => {
                type.innerHTML += `<option value="${item.id}">${item.name}</option>`;
            });
        })
        .catch(() => showToast("Failed to load types", "error"));
    });

    // ================= HANDLE FILES =================
    function handleFiles(files) {

        if (selectedImages.length + files.length > 5) {
            showToast("Max 5 images allowed", "warning");
            return;
        }

        for (let i = 0; i < files.length; i++) {
            if (!files[i].type.startsWith("image/")) {
                showToast("Only images allowed", "error");
                continue;
            }
            selectedImages.push(files[i]);
        }

        renderImages();
        showToast("Images added successfully");
    }

    uploadBox.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", function (e) {
        handleFiles(e.target.files);
        this.value = "";
    });

    uploadBox.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadBox.classList.add("dragover");
    });

    uploadBox.addEventListener("dragleave", () => {
        uploadBox.classList.remove("dragover");
    });

    uploadBox.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadBox.classList.remove("dragover");
        handleFiles(e.dataTransfer.files);
    });

    document.querySelectorAll(".form-control").forEach(input => {
        input.addEventListener("input", () => {
            input.classList.remove("input-error");
            let error = document.getElementById(`error-${input.id}`);
            if (error) error.innerText = "";
        });
    });

    // ================= SUBMIT =================
    document.getElementById("submitBtn").addEventListener("click", function(e){

        e.preventDefault();
        clearErrors();

        let name = document.getElementById('name').value.trim();
        let category = document.getElementById('category').value;
        let type = document.getElementById('type').value;
        let price = document.getElementById('price').value;
        let stock = document.getElementById('stock').value;
        let description = document.getElementById('description').value;
        let imageInput = document.getElementById('imageInput').value;

        // NEW
        let mrp = document.getElementById('mrp')?.value;
        let discount = document.getElementById('discount')?.value;

        let isValid = true;

        if (!name) {
            showError("name", "Product name is required");
            isValid = false;
        }

        if (!category) {
            showError("category", "Please select category");
            isValid = false;
        }

        if (!type) {
            showError("type", "Please select type");
            isValid = false;
        }

        if (!price) {
            showError("price", "Price is required");
            isValid = false;
        } else if (price <= 0) {
            showError("price", "Price must be greater than 0");
            isValid = false;
        }

        // NEW VALIDATION
        if (!mrp) {
            showError("mrp", "MRP is required");
            isValid = false;
        }

        if (discount === "") {
            showError("discount", "Discount is required");
            isValid = false;
        }

        if (!stock) {
            showError("stock", "Stock is required");
            isValid = false;
        }

        if (!description) {
            showError("description", "Description is required");
            isValid = false;
        }

        if (selectedImages.length === 0) {
            showToast("Please upload at least 1 image", "warning");
            isValid = false;
        }

        if (selectedImages.length === 0) {
            showToast("Please upload at least 1 image", "warning");
            isValid = false;
        }

        if (!isValid) {
            showToast("Please fix errors before submitting", "warning");
            return;
        }

        let formData = new FormData();
        formData.append('name', name);
        formData.append('category', category);
        formData.append('type', type);
        formData.append('price', price);
        formData.append('stock', stock);
        formData.append('description', description);

        // NEW
        formData.append('mrp', mrp);
        formData.append('discount', discount);

        selectedImages.forEach(file => {
            formData.append('images', file);
        });

        showToast("Uploading product...", "warning");

        fetch('/api/add-product/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCSRFToken()
            },
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            showToast("Product added successfully 🎉", "success");

            document.getElementById("productForm").reset();
            selectedImages = [];
            renderImages();
        })
        .catch(() => {
            showToast("Something went wrong!", "error");
        });
    });

});

// ================= RENDER IMAGES =================
function renderImages(){
    let container = document.getElementById("previewContainer");
    container.innerHTML = "";

    selectedImages.forEach((file, index) => {
        let div = document.createElement("div");
        div.className = "img-box";
        div.draggable = true;

        let img = document.createElement("img");
        img.src = URL.createObjectURL(file);

        if(index === 0){
            let badge = document.createElement("div");
            badge.className = "main-badge";
            badge.innerText = "Main Image";
            div.appendChild(badge);
        }

        let actions = document.createElement("div");
        actions.className = "img-actions";

        let del = document.createElement("button");
        del.innerHTML = `<i class="bi bi-trash"></i>`;
        del.className = "delete-btn";
        del.onclick = () => {
            selectedImages.splice(index, 1);
            renderImages();
            showToast("Image removed", "error");
        };

        let edit = document.createElement("button");
        edit.innerHTML = `<i class="bi bi-pencil"></i>`;
        edit.className = "edit-btn";
        edit.onclick = () => editImage(index);

        actions.appendChild(edit);
        actions.appendChild(del);

        div.appendChild(img);
        div.appendChild(actions);

        div.addEventListener("dragstart", (e) => {
            e.dataTransfer.setData("index", index);
        });

        div.addEventListener("dragover", (e) => e.preventDefault());

        div.addEventListener("drop", (e) => {
            e.preventDefault();
            let from = e.dataTransfer.getData("index");
            let to = index;

            let item = selectedImages.splice(from, 1)[0];
            selectedImages.splice(to, 0, item);

            renderImages();
            showToast("Image reordered");
        });

        container.appendChild(div);
    });
}

// ================= EDIT IMAGE =================
function editImage(index){
    let input = document.createElement("input");
    input.type = "file";

    input.onchange = function(e){
        let file = e.target.files[0];
        if(file){
            selectedImages[index] = file;
            renderImages();
            showToast("Image updated");
        }
    };

    input.click();
}
</script>
{% endblock %}
