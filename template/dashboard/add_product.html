{% extends "dashboard/base.html" %}
{% load static %}
{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<div class="content-wrapper">

    <div class="card shadow-sm border-0 p-4">
      <div class="d-flex justify-content-between align-items-center mb-3 text-dark">
        <h3 class="mb-0">Add Product</h3>
      </div>
    <form id="productForm" enctype="multipart/form-data" onsubmit="return false;">
            {% csrf_token %}
      <div class="row g-4">

        <!-- NAME -->
        <div class="col-md-6">
            <label>Product Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter Product Name">
            <small class="error-text" id="error-name"></small>
        </div>

        <!-- CATEGORY -->
        <div class="col-md-3">
            <label>Category</label>
            <select id="category" class="form-control"></select>
            <small class="error-text" id="error-category"></small>
        </div>

        <!-- TYPE -->
        <div class="col-md-3">
            <label>Type</label>
            <select id="type" class="form-control"></select>
            <small class="error-text" id="error-type"></small>
        </div>

        <!-- MRP -->
        <div class="col-md-6">
            <label>MRP (Original Price)</label>
            <input type="number" id="mrp" class="form-control" placeholder="Enter MRP">
            <small class="error-text" id="error-mrp"></small>
        </div>

        <!-- PRICE -->
        <div class="col-md-6">
            <label>Price</label>
            <input type="number" id="price" class="form-control" placeholder="Enter Price">
            <small class="error-text" id="error-price"></small>
        </div>

        <!-- FINAL PRICE -->
        <div class="col-md-6">
            <label>Final Price</label>
            <input type="text" id="final_price" class="form-control" readonly>
        </div>

        <!-- DISCOUNT % -->
        <div class="col-md-6">
            <label>Discount %</label>
            <input type="text" id="discount_percent" class="form-control" readonly>
        </div>

        <!-- STOCK -->
        <div class="col-md-6">
            <label>Stock</label>
            <input type="number" id="stock" class="form-control" placeholder="Enter Stock">
            <small class="error-text" id="error-stock"></small>
        </div>

        <div class="col-md-6">
            <label>Discount Amount</label>
            <input type="number" id="discount" class="form-control" placeholder="Enter Discount">
            <small class="error-text" id="error-discount"></small>
        </div>

        <!-- DESCRIPTION -->
        <div class="col-md-12">
            <label>Description</label>
            <textarea id="description" class="form-control" rows="3" placeholder="Enter Description..........."></textarea>
            <small class="error-text" id="error-description"></small>
        </div>

        <!-- IMAGE SECTION -->
            <div class="col-md-12">
            <label>Product Images (Max 5)</label>

            <div class="image-upload-box">
                <input type="file" id="imageInput" multiple>
                <p>Click or Drag Images Here</p>
            </div>
            <small class="error-text" id="error-imageInput"></small>

            <div id="previewContainer" class="image-grid mt-3"></div>
            </div>

            <!-- BUTTON -->
            <div class="col-md-12">
                <button type="button" id="submitBtn" class="btn btn-primary">Add Product</button>
            </div>

        </div>

    </form>

  </div>

</div>
{% endblock %}
