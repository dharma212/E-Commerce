{% extends "base.html" %}
{% block content %}
{% load static %}
<div class="container" style="margin-top:100px;max-width:700px;">

    <div class="card p-4 profile-card">

        <!-- HEADER -->
        <div class="profile-header mb-3">

            <div class="avatar-wrapper">

                <div class="profile-avatar" onclick="openImageModal()">
                    <img id="profileImage" style="display:none;">
                    <span id="avatarText">U</span>
                </div>

                <span class="edit-btn" onclick="openImageModal()">
                    <i class="bi bi-camera-fill"></i>
                </span>

            </div>

            <div>
                <h4 id="displayName">Your Name</h4>
                <small style="font-weight:600; color:#000;">Double click to edit</small>
            </div>

        </div>

        <!-- PROGRESS -->
        <div class="profile-progress">
            <div class="progress-track">
                <div id="progressBar" class="progress-fill"></div>
            </div>
            <div id="progressText" class="progress-text">0%</div>
        </div>

        <!-- FORM -->
        <div class="row">

        <!-- USERNAME -->
        <div class="col-md-6 mb-3">
        <label>Username</label>
        <div class="display-field" ondblclick="enableEdit('username')">
        <span id="usernameText">--</span>
        </div>
        <input id="username" class="form-control d-none">
        <small id="usernameError" class="text-danger"></small>
        </div>

        <!-- EMAIL -->
        <div class="col-md-6 mb-3">
        <label>Email</label>
        <div class="display-field" ondblclick="enableEdit('email')">
        <span id="emailText">--</span>
        </div>
        <input id="email" class="form-control d-none">
        <small id="emailError" class="text-danger"></small>
        </div>

        <!-- FIRST NAME -->
        <div class="col-md-6 mb-3">
        <label>First Name</label>
        <div class="display-field" ondblclick="enableEdit('first_name')">
        <span id="first_nameText">--</span>
        </div>
        <input id="first_name" class="form-control d-none">
        <small id="first_nameError" class="text-danger"></small>
        </div>

        <!-- LAST NAME -->
        <div class="col-md-6 mb-3">
        <label>Last Name</label>
        <div class="display-field" ondblclick="enableEdit('last_name')">
        <span id="last_nameText">--</span>
        </div>
        <input id="last_name" class="form-control d-none">
        <small id="last_nameError" class="text-danger"></small>
        </div>

        <!-- PHONE -->
        <div class="col-md-6 mb-3">
        <label>Phone</label>
        <div class="display-field" ondblclick="enableEdit('phone')">
        <span id="phoneText">--</span>
        </div>
        <input id="phone" class="form-control d-none">
        <small id="phoneError" class="text-danger"></small>
        </div>

        <!-- CITY -->
        <div class="col-md-6 mb-3">
        <label>City</label>
        <div class="display-field" ondblclick="enableEdit('city')">
        <span id="cityText">--</span>
        </div>
        <input id="city" class="form-control d-none">
        <small id="cityError" class="text-danger"></small>
        </div>

        <!-- BIO -->
        <div class="col-12 mb-3">
        <label>Bio</label>
        <div class="display-field" ondblclick="enableEdit('bio')">
        <span id="bioText">--</span>
        </div>
        <input id="bio" class="form-control d-none">
        <small id="bioError" class="text-danger"></small>
        </div>

        </div>

    </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="image-modal">
    <div class="image-modal-content">

        <div class="modal-header-custom">
            <h5>Update Profile Photo</h5>
            <span onclick="closeImageModal()">✖</span>
        </div>

        <div class="image-preview-box">
            <img id="popupImage" src="{% static 'img/download.jpg' %}">
        </div>

        <label class="upload-box">
            <input type="file" id="imageInput" hidden>
            <span>Select Image</span>
        </label>

        <button class="btn btn-primary w-100 mt-3" onclick="uploadImage()">
            Upload
        </button>

    </div>
</div>
{% endblock %}
