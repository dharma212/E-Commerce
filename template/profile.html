{% extends "base.html" %}
{% block content %}
{% load static %}
<div class="container" style="margin-top:100px;max-width:700px;">

    <div class="card p-4 profile-card">

        <!-- HEADER -->
        <div class="profile-header mb-3">

            <div class="avatar-wrapper">

                <div class="profile-avatar" onclick="openImageModal()">
                    <img id="profileImage" style="display:none;">
                    <span id="avatarText">U</span>
                </div>

                <span class="edit-btn" onclick="openImageModal()">
                    <i class="bi bi-camera-fill"></i>
                </span>

            </div>

            <div>
                <h4 id="displayName">Your Name</h4>
                <small style="font-weight:600; color:#000;">Double click to edit</small>
            </div>

        </div>

        <!-- PROGRESS -->
        <div class="profile-progress">
            <div class="progress-track">
                <div id="progressBar" class="progress-fill"></div>
            </div>
            <div id="progressText" class="progress-text">0%</div>
        </div>

        <!-- FORM -->
        <div class="row">

        <!-- USERNAME -->
        <div class="col-md-6 mb-3">
        <label>Username</label>
        <div class="display-field" ondblclick="enableEdit('username')">
        <span id="usernameText">--</span>
        </div>
        <input id="username" class="form-control d-none">
        <small id="usernameError" class="text-danger"></small>
        </div>

        <!-- EMAIL -->
        <div class="col-md-6 mb-3">
        <label>Email</label>
        <div class="display-field" ondblclick="enableEdit('email')">
        <span id="emailText">--</span>
        </div>
        <input id="email" class="form-control d-none">
        <small id="emailError" class="text-danger"></small>
        </div>

        <!-- FIRST NAME -->
        <div class="col-md-6 mb-3">
        <label>First Name</label>
        <div class="display-field" ondblclick="enableEdit('first_name')">
        <span id="first_nameText">--</span>
        </div>
        <input id="first_name" class="form-control d-none">
        <small id="first_nameError" class="text-danger"></small>
        </div>

        <!-- LAST NAME -->
        <div class="col-md-6 mb-3">
        <label>Last Name</label>
        <div class="display-field" ondblclick="enableEdit('last_name')">
        <span id="last_nameText">--</span>
        </div>
        <input id="last_name" class="form-control d-none">
        <small id="last_nameError" class="text-danger"></small>
        </div>

        <!-- PHONE -->
        <div class="col-md-6 mb-3">
        <label>Phone</label>
        <div class="display-field" ondblclick="enableEdit('phone')">
        <span id="phoneText">--</span>
        </div>
        <input id="phone" class="form-control d-none">
        <small id="phoneError" class="text-danger"></small>
        </div>

        <!-- CITY -->
        <div class="col-md-6 mb-3">
        <label>City</label>
        <div class="display-field" ondblclick="enableEdit('city')">
        <span id="cityText">--</span>
        </div>
        <input id="city" class="form-control d-none">
        <small id="cityError" class="text-danger"></small>
        </div>

        <!-- BIO -->
        <div class="col-12 mb-3">
        <label>Bio</label>
        <div class="display-field" ondblclick="enableEdit('bio')">
        <span id="bioText">--</span>
        </div>
        <input id="bio" class="form-control d-none">
        <small id="bioError" class="text-danger"></small>
        </div>

        </div>

    </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="image-modal">
    <div class="image-modal-content">

        <div class="modal-header-custom">
            <h5>Update Profile Photo</h5>
            <span onclick="closeImageModal()">✖</span>
        </div>

        <div class="image-preview-box">
            <img id="popupImage" src="{% static 'img/download.jpg' %}">
        </div>

        <label class="upload-box">
            <input type="file" id="imageInput" hidden>
            <span>Select Image</span>
        </label>

        <button class="btn btn-primary w-100 mt-3" onclick="uploadImage()">
            Upload
        </button>

    </div>
</div>

<!-- ================= CSS ================= -->
<style>
    .profile-progress {
    margin: 20px 0;
}

.progress-track {
    width: 100%;
    height: 12px;
    background: #eaeaea;
    border-radius: 50px;
    overflow: hidden;
    position: relative;
}

.progress-fill {
    height: 100%;
    width: 0%;
    border-radius: 50px;
    background: linear-gradient(90deg, #4CAF50, #2ecc71);
    transition: width 0.4s ease-in-out;
    position: relative;
}

/* Shine effect */
.progress-fill::after {
    content: "";
    position: absolute;
    top: 0;
    left: -50%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.4);
    transform: skewX(-20deg);
    animation: shine 2s infinite;
}

@keyframes shine {
    0% { left: -50%; }
    100% { left: 120%; }
}

.progress-text {
    margin-top: 6px;
    font-size: 13px;
    text-align: right;
    font-weight: 600;
    color: #2ecc71;
}
    .profile-card {
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08)
    }

    .profile-header {
        display: flex;
        align-items: center;
        gap: 15px
    }

    .profile-avatar {
        width: 75px;
        height: 75px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4CAF50, #2ecc71);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        cursor: pointer;
        overflow: hidden
    }

    .profile-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover
    }

    .edit-btn {
        position: absolute;
        bottom: 0;
        right: 0;
        background: #fffb02;
        color: #fff;
        padding: 4px;
        border-radius: 50%;
        cursor: pointer
    }

    .avatar-wrapper {
        position: relative
    }

    .display-field {
        padding: 10px;
        background: #f8f9fa;
        border-radius: 10px;
        cursor: pointer;
        border: 1px solid #ddd
    }

    .display-field:hover {
        border-color: #4CAF50;
        background: #f1fff5
    }

    .is-invalid {
        border: 2px solid #e74c3c !important
    }

    .progress {
        height: 10px;
        border-radius: 20px
    }

    .progress-bar {
        background: linear-gradient(90deg, #4CAF50, #2ecc71)
    }

    .image-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999
    }

    .image-modal-content {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        width: 320px
    }

    .modal-header-custom {
        display: flex;
        justify-content: space-between
    }

    .modal-header-custom:hover {
        cursor:pointer;
    }

    .image-preview-box {
        height: 200px;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center
    }

    .upload-box {
        display: block;
        margin-top: 15px;
        padding: 10px;
        border: 2px dashed #ccc;
        text-align: center;
        cursor: pointer
    }

    /* toast */
    .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 16px;
        color: #fff;
        border-radius: 6px;
        z-index: 999999;
    }
    @keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
    }
    .edit-btn {
    position: absolute;
    bottom: 0;
    right: 0;

    width: 26px;
    height: 26px;

    background: #FFD333 ;
    color: #000;

    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;

    cursor: pointer;
    font-size: 14px;

    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.2s;
}
.edit-btn i {
    font-size: 13px;
}
.avatar-wrapper {
    position: relative;
    display: inline-block;
}
.image-preview-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
.image-preview-box {
    height: 200px;
    width: 200px;          
    margin: auto;
    border-radius: 50%;    
    overflow: hidden;      
    background: #f5f5f5;

    display: flex;
    align-items: center;
    justify-content: center;
}

.image-preview-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;     
    border-radius: 50%;    
}
</style>

<!-- ================= JS ================= -->
<script>
let currentField = null;
let editTimer = null;

/* ================= TOAST ================= */
function showToast(msg, type = "success") {
    const old = document.querySelector(".toast-box");
    if (old) old.remove();

    const icons = {
        success: '<i class="bi bi-check-circle-fill"></i>',
        error: '<i class="bi bi-x-circle-fill"></i>',
        warning: '<i class="bi bi-exclamation-triangle-fill"></i>'
    };

    const colors = {
        success: "#2ecc71",
        error: "#e74c3c",
        warning: "#f39c12"
    };

    const t = document.createElement("div");
    t.className = "toast-box";

    t.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:18px">${icons[type]}</span>
            <span>${msg}</span>
        </div>
    `;

    Object.assign(t.style, {
        position: "fixed",
        top: "20px",
        right: "20px",
        background: colors[type],
        color: "#fff",
        padding: "12px 18px",
        borderRadius: "10px",
        boxShadow: "0 8px 20px rgba(0,0,0,0.15)",
        zIndex: "9999999",
        fontSize: "14px",
        animation: "slideIn 0.3s ease"
    });

    document.body.appendChild(t);

    setTimeout(() => {
        t.style.opacity = "0";
        t.style.transform = "translateX(100%)";
        t.style.transition = "0.3s";
        setTimeout(() => t.remove(), 300);
    }, 3000);
}

/* ================= CSRF ================= */
function getCSRFToken() {
    return document.cookie.split('; ')
        .find(r => r.startsWith('csrftoken'))?.split('=')[1];
}

/* ================= LOAD USER ================= */
async function loadUser() {
    try {
        const res = await fetch("/api/user-profile/", {
            method: "GET",
            credentials: "include"
        });

        if (!res.ok) throw new Error();

        const data = await res.json();

        ["username","email","first_name","last_name","phone","city","bio"]
        .forEach(f => {
            const input = document.getElementById(f);
            const text = document.getElementById(f + "Text");

            if (input) input.value = data[f] || "";
            if (text) text.innerText = data[f] || "--";
        });

        if (data.image) {
            profileImage.src = data.image;
            profileImage.style.display = "block";
            avatarText.style.display = "none";
        }

        updateName();
        updateProgress();

    } catch {
        showToast("Failed to load profile", "error");
    }
}

/* ================= EDIT ================= */
function enableEdit(id) {
    if (currentField) return;

    currentField = id;

    const input = document.getElementById(id);
    const text = document.getElementById(id + "Text");

    input.classList.remove("d-none");
    text.parentElement.style.display = "none";

    input.value = text.innerText === "--" ? "" : text.innerText;
    input.focus();

    // 👇 Smart help if user confused
    editTimer = setTimeout(() => {
        showToast("Type and press Enter or click outside to save", "warning");
    }, 3000);
}

/* ================= SAVE ================= */
async function saveField(id) {
    const input = document.getElementById(id);
    const errBox = document.getElementById(id + "Error");

    const fieldNames = {
        username: "Username",
        email: "Email",
        first_name: "First name",
        last_name: "Last name",
        phone: "Phone number",
        city: "City",
        bio: "Bio"
    };

    const value = input.value.trim();
    const label = fieldNames[id];

    if (!value) {
        const msg = `${label} is required`;
        errBox.innerText = msg;
        input.classList.add("is-invalid");
        showToast(msg, "warning");
        return false;
    }

    if (id === "email" && !/^\S+@\S+\.\S+$/.test(value)) {
        return error("Enter valid email");
    }

    if (id === "phone" && !/^[0-9]{10}$/.test(value)) {
        return error("Phone must be 10 digits");
    }

    function error(msg){
        errBox.innerText = msg;
        input.classList.add("is-invalid");
        showToast(msg, "warning");
        return false;
    }

    errBox.innerText = "";
    input.classList.remove("is-invalid");

    try {
        const res = await fetch("/api/user-profile/", {
            method: "POST",
            credentials: "include",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken()
            },
            body: JSON.stringify({ [id]: value })
        });

        const data = await res.json();

        if (!res.ok) {
            const msg = data[id]?.[0] || "Update failed";
            showToast(msg, "error");
            return false;
        }

        showToast(`${label} updated successfully`, "success");

        document.getElementById(id + "Text").innerText = value;

        updateName();
        updateProgress();

        return true;

    } catch {
        showToast("Network error", "error");
        return false;
    }
}

/* ================= CLICK OUTSIDE ================= */
document.addEventListener("click", async (e) => {
    if (!currentField) return;

    const input = document.getElementById(currentField);
    const text = document.getElementById(currentField + "Text");

    if (!input || input.contains(e.target)) return;

    const changed = input.value !== text.innerText;

    if (changed) {
        const ok = await saveField(currentField);
        if (!ok) return;
    }

    disableEdit();
});

/* ================= ENTER KEY ================= */
document.addEventListener("keydown", async (e) => {
    if (e.key === "Enter" && currentField) {
        e.preventDefault();

        const ok = await saveField(currentField);
        if (!ok) return;

        disableEdit();
    }
});

/* ================= DISABLE ================= */
function disableEdit() {
    const input = document.getElementById(currentField);
    const text = document.getElementById(currentField + "Text");

    input.classList.add("d-none");
    text.parentElement.style.display = "block";

    clearTimeout(editTimer);
    currentField = null;
}

/* ================= NAME ================= */
function updateName() {
    const name = (first_name.value + " " + last_name.value).trim();
    displayName.innerText = name || "Your Name";
    avatarText.innerText = displayName.innerText.charAt(0).toUpperCase();
}

/* ================= PROGRESS ================= */
function updateProgress() {
    const fields = ["username","email","first_name","last_name","phone","city","bio"];

    const filled = fields.filter(f =>
        document.getElementById(f).value.trim()
    ).length;

    const percent = Math.floor((filled / fields.length) * 100);

    progressBar.style.width = percent + "%";
    progressText.innerText = percent + "%";
}

/* ================= IMAGE ================= */
function openImageModal() {
    const modal = document.getElementById("imageModal");
    const popupImage = document.getElementById("popupImage");

    modal.style.display = "flex";

    if (profileImage && profileImage.src && profileImage.style.display !== "none") {
        popupImage.src = profileImage.src;
    } else {
        popupImage.src = "/static/img/download.jpg";
    }
}

function closeImageModal() {
    document.getElementById("imageModal").style.display = "none";
}

async function uploadImage() {
    const input = document.getElementById("imageInput");
    const file = input.files[0];

    if (!file) {
        showToast("Select image", "warning");
        return;
    }

    const form = new FormData();
    form.append("image", file);

    const res = await fetch("/api/upload-image/", {
        method: "POST",
        credentials: "include",
        headers: { "X-CSRFToken": getCSRFToken() },
        body: form
    });

    const data = await res.json();

    if (res.ok) {
        profileImage.src = data.image;
        profileImage.style.display = "block";
        avatarText.style.display = "none";

        // ✅ reset input (IMPORTANT)
        input.value = "";

        showToast("Image updated successfully");
        closeImageModal();
    } else {
        showToast("Upload failed", "error");
    }
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", () => {
    window.profileImage = document.getElementById("profileImage");
    window.avatarText = document.getElementById("avatarText");
    window.displayName = document.getElementById("displayName");
    window.progressBar = document.getElementById("progressBar");
    window.progressText = document.getElementById("progressText");
    window.first_name = document.getElementById("first_name");
    window.last_name = document.getElementById("last_name");

    // image preview
    const imageInput = document.getElementById("imageInput");
const popupImage = document.getElementById("popupImage");

imageInput.addEventListener("change", function () {
    const file = this.files[0];

    if (file) {
        const previewURL = URL.createObjectURL(file);

        popupImage.src = previewURL;
        popupImage.style.display = "block";

        // Optional: free memory
        popupImage.onload = () => URL.revokeObjectURL(previewURL);
    }
});

    // show help once
    if (!localStorage.getItem("profile_help")) {
        showToast("Tip: Double click any field to edit profile", "warning");
        localStorage.setItem("profile_help", "true");
    }

    loadUser();
});
</script>

{% endblock %}
