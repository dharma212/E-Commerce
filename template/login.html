<div id="loginModal" class="login-modal">
    <div class="login-box">
        <button class="login-close" onclick="closeLoginModal()">&times;</button>
        <div class="login-logo"><i class="fa fa-user-circle"></i></div>
        <h3 class="login-title">Welcome Back</h3>
        <p class="login-subtitle">Login with OTP to continue shopping</p>

        <div id="popup_step1">
            <div class="login-input-group">
                <i class="fa fa-user"></i>
                <input type="text" id="popup_username" placeholder="Enter Username" class="login-input">
            </div>
            <div class="login-error" id="username-error"></div>

            <div class="login-input-group">
                <i class="fa fa-envelope"></i>
                <input type="text" id="popup_email" placeholder="Enter Email or Phone" class="login-input">
            </div>
            <div class="login-error" id="email-error"></div>

            <button onclick="sendOTP()" class="login-btn">Send OTP</button>
            <p style="margin-top: 15px; font-size: 13px;">
                Don't have an account? <a href="javascript:void(0)" onclick="openSignupModal()" style="color: #28a745; font-weight: bold; text-decoration: none;">Sign Up</a>
            </p>
        </div>

        <div id="popup_step2" style="display: none;">
            <div class="login-input-group">
                <i class="fa fa-lock"></i>
                <input type="text" id="popup_otp" placeholder="Enter OTP" class="login-input">
            </div>
            <div class="login-error" id="otp-error"></div>
            <button onclick="verifyOTP()" class="login-btn success-btn">Verify OTP</button>
        </div>
    </div>
</div>

<div id="signupModal" class="login-modal">
    <div class="login-box">
        <button class="login-close" onclick="closeSignupModal()">&times;</button>
        <div class="login-logo"><i class="fa fa-user-plus"></i></div>
        <h3 class="login-title">Create Account</h3>
        <p class="login-subtitle">Fill in details to set up your account</p>

        <div>
            <div class="signup-grid">
                
                <div class="full-width-row">
                    <div class="login-input-group">
                        <i class="fa fa-user"></i>
                        <input type="text" id="signup_username" placeholder="Username" class="login-input">
                    </div>
                    <div class="login-error" id="signup-username-error"></div>
                </div>

                <div>
                    <div class="login-input-group">
                        <i class="fa fa-id-card"></i>
                        <input type="text" id="signup_firstname" placeholder="First Name" class="login-input">
                    </div>
                    <div class="login-error" id="signup-firstname-error"></div>
                </div>

                <div>
                    <div class="login-input-group">
                        <i class="fa fa-id-card"></i>
                        <input type="text" id="signup_lastname" placeholder="Last Name" class="login-input">
                    </div>
                    <div class="login-error" id="signup-lastname-error"></div>
                </div>

                <div>
                    <div class="login-input-group">
                        <i class="fa fa-envelope"></i>
                        <input type="email" id="signup_email" placeholder="Email Address" class="login-input">
                    </div>
                    <div class="login-error" id="signup-email-error"></div>
                </div>

                <div>
                    <div class="login-input-group">
                        <i class="fa fa-phone"></i>
                        <input type="text" id="signup_phone" placeholder="10-Digit Phone" class="login-input">
                    </div>
                    <div class="login-error" id="signup-phone-error"></div>
                </div>

            </div>
            <button onclick="processSignupAndGoToLogin()" class="login-btn">Register & Go to Login</button>
            
            <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #64748b;">
                Already have an account? <a href="javascript:void(0)" onclick="openLoginModal()" style="color: #3d5afe; font-weight: 600; text-decoration: none;">Login</a>
            </p>
        </div>
    </div>
</div>
{% if messages %}

<div class="toast-container">

    {% for message in messages %}

    <div class="custom-toast {{ message.tags }}">
        {{ message }}
    </div>

    {% endfor %}

</div>

{% endif %}
