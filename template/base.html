{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Free HTML Templates" name="keywords">
    <meta content="Free HTML Templates" name="description">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">  
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static "css/style.css" %}">
    <link rel="stylesheet" href="{% static "css/profile.css" %}">
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body data-authenticated="{% if request.user.is_authenticated %}true{% else %}false{% endif %}">
    {% include "header.html" %}
    {% block content %}{% endblock content %}
<!-- LOGIN MODAL -->
<div id="loginModal" class="login-modal">

    <div class="login-box">

        <!-- CLOSE -->
        <button class="login-close" onclick="closeLoginModal()">
            &times;
        </button>

        <!-- LOGO -->
        <div class="login-logo">
            <i class="fa fa-user-circle"></i>
        </div>

        <!-- TITLE -->
        <h3 class="login-title">Welcome Back</h3>

        <p class="login-subtitle">
            Login with OTP to continue shopping
        </p>

        <!-- STEP 1 -->
        <div id="popup_step1">

            <div class="login-input-group">
                <i class="fa fa-user"></i>

                <input
                    type="text"
                    id="popup_username"
                    placeholder="Enter Username"
                    class="login-input"
                >
            </div>

            <div class="login-input-group">
                <i class="fa fa-envelope"></i>

                <input
                    type="text"
                    id="popup_email"
                    placeholder="Enter Email or Phone"
                    class="login-input"
                >
            </div>

            <button onclick="sendOTP()" class="login-btn">
                Send OTP
            </button>

        </div>

        <!-- STEP 2 -->
        <div id="popup_step2" style="display:none;">

            <div class="login-input-group">
                <i class="fa fa-lock"></i>

                <input
                    type="text"
                    id="popup_otp"
                    placeholder="Enter OTP"
                    class="login-input"
                >
            </div>

            <button onclick="verifyOTP()" class="login-btn success-btn">
                Verify OTP
            </button>

        </div>

    </div>

</div>
<style>

.login-modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    z-index:99999;
    backdrop-filter:blur(4px);
    animation:fadeIn .3s ease;
}

.login-box{
    width:400px;
    max-width:95%;
    background:#fff;
    border-radius:20px;
    padding:35px 30px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    animation:popup .3s ease;
    text-align:center;
}

.login-close{
    position:absolute;
    top:15px;
    right:15px;
    border:none;
    background:none;
    font-size:28px;
    cursor:pointer;
    color:#999;
}

.login-close:hover{
    color:#000;
}

.login-logo{
    width:90px;
    height:90px;
    background:#f3f6ff;
    margin:auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    color:#3d5afe;
    margin-bottom:20px;
}

.login-title{
    font-weight:700;
    margin-bottom:5px;
}

.login-subtitle{
    color:#777;
    font-size:14px;
    margin-bottom:25px;
}

.login-input-group{
    position:relative;
    margin-bottom:18px;
}

.login-input-group i{
    position:absolute;
    top:50%;
    left:15px;
    transform:translateY(-50%);
    color:#888;
}

.login-input{
    width:100%;
    height:50px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:0 15px 0 45px;
    outline:none;
    transition:.3s;
}

.login-input:focus{
    border-color:#3d5afe;
    box-shadow:0 0 0 4px rgba(61,90,254,0.1);
}

.login-btn{
    width:100%;
    height:50px;
    border:none;
    border-radius:12px;
    background:#3d5afe;
    color:#fff;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    background:#2441e8;
}

.success-btn{
    background:#28a745;
}

.success-btn:hover{
    background:#218838;
}

@keyframes popup{
    from{
        transform:translate(-50%,-45%);
        opacity:0;
    }
    to{
        transform:translate(-50%,-50%);
        opacity:1;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

</style>
    {% include "footer.html" %}

    <script src="{% static 'js/profile.js' %}"></script>
    <script src="{% static 'js/login_pop.js' %}"></script>
</html>
